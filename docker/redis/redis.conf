# Redis 配置（生产用）

# 绑定所有网卡（容器内使用）
bind 0.0.0.0

# 默认端口
port 6379

# 关闭保护模式（容器内网，无需密码保护；如需密码请取消下方注释并设置）
protected-mode no
# requirepass your_redis_password

# 持久化：每 60 秒内有 1 次写入则触发 RDB 快照
save 60 1

# RDB 快照文件
dbfilename dump.rdb
dir /data

# 最大内存及淘汰策略（按实际内存调整）
maxmemory 256mb
maxmemory-policy allkeys-lru

# 关闭 AOF（如需更强持久化可改为 yes）
appendonly no

# 日志级别
loglevel notice
